# 이 파일은 script/generate_admin_config.py 로 생성했습니다.
# pages.files 목록을 바꾸려면 스크립트의 프로필/라벨을 수정한 뒤 다시 실행하세요.

backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "posts"
    label: "Posts"
    folder: "_posts"
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Section", name: "section", widget: "select", options: [{ label: "Techs", value: "techs" }, { label: "표시 안 함", value: "" }], default: "", required: false }
      - { label: "Categories", name: "categories", widget: "list", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
  - name: "pages"
    label: "Pages"
    files:
      - file: "_pages/cases/index.md"
        name: "cases"
        label: "Cases"
        fields:
          - { label: "Layout", name: "layout", widget: "select", options: ["page", "section", "sections/techs", "sections/settings", "pages/editor", "pages/example", "pages/quiz", "pages/voca", "startup"], default: "section" }
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Permalink", name: "permalink", widget: "string", required: false }
          - { label: "Icon", name: "icon", widget: "string", required: false }
          - { label: "Type", name: "type", widget: "select", options: [{ label: "Sidebar", value: "sidebar" }, { label: "Topbar", value: "topbar" }, { label: "Sidebar (footer)", value: "sidebar_footer" }], default: "sidebar" }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "_pages/cases/nvme-mi-basic/index.md"
        name: "cases-nvme-mi-basic"
        label: "Cases › NVMe-MI Basic"
        fields:
          - { label: "Layout", name: "layout", widget: "select", options: ["page", "pages/editor", "pages/example", "pages/quiz", "pages/voca", "section", "sections/settings", "sections/techs", "startup"], default: "page" }
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Body", name: "body", widget: "markdown" }
      - file: "_pages/cases/nvme-spf-mpf/index.md"
