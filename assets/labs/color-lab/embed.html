<div class="color-lab-root">
  <div class="app">
    <header class="app-bar">
      <h1 class="site-title">Color Lab</h1>
      <div class="hex-controls">
        <label class="visually-hidden" for="color-value-input">Color value</label>
        <input
          type="text"
          id="color-value-input"
          class="color-input"
          placeholder="3B5BDB"
          spellcheck="false"
          autocomplete="off"
        />
      </div>
      <div class="color-type-segment" role="radiogroup" aria-label="Color value type">
        <button
          type="button"
          class="segment-option is-selected"
          data-color-type="hex"
          role="radio"
          aria-checked="true"
        >
          HEX
        </button>
        <button
          type="button"
          class="segment-option"
          data-color-type="rgb"
          role="radio"
          aria-checked="false"
        >
          RGB
        </button>
        <button
          type="button"
          class="segment-option"
          data-color-type="hsl"
          role="radio"
          aria-checked="false"
        >
          HSL
        </button>
        <button
          type="button"
          class="segment-option"
          data-color-type="hsv"
          role="radio"
          aria-checked="false"
        >
          HSV
        </button>
      </div>
    </header>

    <p id="hex-error" class="error-message" role="alert" hidden></p>

    <main class="dashboard">
      <div class="picker-column">
        <h2 id="picker-heading" class="micro-label">Picker</h2>
        <section
          class="picker-panel"
          aria-labelledby="picker-heading"
        >
        <div class="picker-stack">
          <div class="sv-picker-row">
            <div class="sv-wrap">
              <canvas
                id="color-sv"
                class="color-sv"
                width="200"
                height="200"
                aria-label="Saturation and brightness"
                role="img"
              ></canvas>
              <div id="sv-cursor" class="picker-cursor" hidden aria-hidden="true"></div>
            </div>
            <div class="hue-wrap">
              <canvas
                id="color-hue"
                class="color-hue"
                width="22"
                height="200"
                aria-label="Hue"
                role="img"
              ></canvas>
              <div id="hue-cursor" class="hue-cursor" hidden aria-hidden="true"></div>
            </div>
          </div>
        </div>
        </section>
      </div>

      <div class="side-panel">
        
        <h2 id="values-heading" class="micro-label">Values</h2>
        <div class="preview-values-row">
          <div id="preview-card" class="preview-card" aria-label="Current color">
            <span id="preview-label" class="preview-label">#3B5BDB</span>
          </div>

          <section class="values-section" aria-labelledby="values-heading">
            <div class="value-row color-name-row">
              <span class="value-label">Name</span>
              <input
                type="text"
                id="color-name-input"
                class="color-name-input"
                placeholder="Optional"
                maxlength="48"
                spellcheck="false"
                autocomplete="off"
                aria-label="Color name"
              />
            </div>
            <div class="value-row color-memo-row">
              <span class="value-label">Memo</span>
              <textarea
                id="color-memo-input"
                class="color-memo-input"
                placeholder="Optional note for this palette color"
                maxlength="200"
                rows="2"
                spellcheck="true"
                aria-label="Color memo"
              ></textarea>
            </div>
            <div id="value-hex-summary" class="value-row value-hex-summary">
              <span class="value-label">HEX</span>
              <span class="value-text" id="value-hex-summary-text">#3B5BDB</span>
              <button
                type="button"
                id="values-list-toggle"
                class="values-list-toggle"
                aria-expanded="false"
                aria-controls="value-list"
                aria-label="RGB, HSL, HSV 목록 보기"
              ></button>
            </div>
            <ul class="value-list" id="value-list" hidden></ul>
          </section>
        </div>

        <section class="palette-section" aria-labelledby="palette-heading">
          <h2 id="palette-heading" class="micro-label">Palette</h2>
          <div class="palette-scroll">
            <div id="palette-grids" class="palette-grids"></div>
          </div>

          <div
            id="palette-set-picker"
            class="palette-set-segment"
            role="tablist"
            aria-labelledby="palette-sets-heading"
          ></div>
        </section>

        <section
          id="others-section"
          class="others-section"
          aria-labelledby="others-heading"
        >
          <h2 id="others-heading" class="micro-label">Others</h2>
          <div class="others-actions">
            <button
              type="button"
              id="export-palette-json-btn"
              class="others-action-btn"
            >
              Export as JSON
            </button>
            <button
              type="button"
              id="eyedropper-btn"
              class="eyedropper-btn"
              hidden
              aria-label="스포이드"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="eyedropper-icon"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="m15 11.25 1.5 1.5.75-.75V8.758l2.276-.61a3 3 0 1 0-3.675-3.675l-.61 2.277H12l-.75.75 1.5 1.5M15 11.25l-8.47 8.47c-.34.34-.8.53-1.28.53s-.94.19-1.28.53l-.97.97-.75-.75.97-.97c.34-.34.53-.8.53-1.28s.19-.94.53-1.28L12.75 9M15 11.25 12.75 9"
                />
              </svg>
            </button>
          </div>
        </section>
      </div>
    </main>
  </div>
</div>
