<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" class="orbit orbit-default">
  <style>
    <![CDATA[
      /* Inline SVG only: classes apply when this markup is embedded in HTML (not via <img src>). */
      .orbit .orbit-void {
        fill: #ffffff;
        opacity: 0;
        transition: opacity 0.14s ease-out;
      }
      .orbit.orbit-hover:not(.orbit-selected) .orbit-void,
      .orbit:focus-visible:not(.orbit-selected) .orbit-void {
        opacity: 0.15;
      }
      .orbit.orbit-selected .orbit-void {
        opacity: 1;
      }
    ]]>
  </style>
  <defs>
    <mask id="orbit-sphere-mask" maskUnits="userSpaceOnUse">
      <rect width="1024" height="1024" fill="#ffffff" />
      <ellipse cx="680" cy="355" rx="42" ry="31" transform="rotate(48 680 355)" fill="#000000" />
    </mask>
  </defs>
  <ellipse class="orbit-void" cx="680" cy="355" rx="42" ry="31" transform="rotate(48 680 355)" />
  <circle cx="512" cy="512" r="370" fill="#59636a" mask="url(#orbit-sphere-mask)" />
</svg>
