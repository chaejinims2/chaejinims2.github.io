        - name: surface-muted
          label: surface-muted
          # desc: Inset / secondary surfaces.
        - name: border
          label: border
          # desc: Hairlines; matches tokens --border.
    text:
      label: Text
      items:
        - name: text-primary
          label: text-primary
          # desc: Headings, body on dark.
        - name: text-muted
          label: text-muted
          # desc: Secondary nav, captions, meta.
    accent:
      label: Accent
      items:
        - name: accent
          label: accent
          # desc: Links, primary fills, interactive emphasis.
        - name: brand
          label: brand
          # desc_html: 'Preview-only accent; sidebar mark uses <code>currentColor</code> (not this swatch).'
        - name: nav-active-bg
          label: nav-active-bg
          # desc: Current row tint (tokens --app-nav-item-active-bg).
        - name: nav-active-fg
          label: nav-active-fg
          # desc: Active nav label (app uses high-contrast inverse).
    status:
      label: Status
      items:
        - name: success
          label: success
          # desc: Positive feedback.
        - name: warning
          label: warning
          # desc: Caution.
        - name: danger
          label: danger
          # desc: Errors, destructive actions.

