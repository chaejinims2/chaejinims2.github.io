layout:
  groups:
    cards:
      label: Cards
      items:
        - name: card-default
          label: Standard surface
          desc_html: 'Bordered card on <code>--surface</code>. Use for case study summaries and notes.'
        - name: card-ring
          label: Ring halo
          desc_html: '1px ring via <code>box-shadow</code> (no extra border width). Good for selectable tiles.'
        - name: card-elevated
          label: Elevated
          desc_html: 'Theme <code>--shadow</code> via preview alias <code>--shadow-2</code>.'
        - name: container-whisper
          label: Whisper
          desc_html: Large soft blur — featured cards, marketing tiles.
        - name: container-inset
          label: Inset
          desc_html: 'Inset ring on <code>--surface-muted</code> — form groups, code wells.'
        - name: container-muted
          label: Muted
          desc_html: '<ul class="highlight-list"><li>Kernel 5.9.16</li><li>Reduced module size</li><li>Higher max PF count</li></ul>'
        - name: elevation-flat
          label: Flat
          desc: Canvas background. No shadow — hierarchy from borders and type.
        - name: elevation-contained
          label: Contained
          desc: 1px border only — default panels and lists.
        - name: elevation-surface
          label: Surface highlight
          desc_html: 'Inset top hairline (<code>--shadow-1</code>) — toolbar chips, inputs.'
        - name: elevation-ring
          label: Ring
          desc: Outer 1px ring without border width — focus-adjacent surfaces.
        - name: elevation-raised
          label: Raised
          desc_html: 'Theme <code>--shadow</code> — dropdowns, sticky bars.'
        - name: elevation-whisper
          label: Whisper
          desc: Large soft blur — featured cards, marketing tiles.
        - name: elevation-inset
          label: Inset
          desc: Inset ring on muted surface — pressed or recessed regions.

variants:
  groups:
    buttons:
      label: Buttons
      items:
        - name: btn-primary
          label: Primary
          desc: Primary
        - name: btn-secondary
          label: Secondary
          desc: Secondary
        - name: btn-danger
          label: Danger
          desc: Danger / destructive
        - name: btn-primary
          label: Disabled
          desc: Disabled state
          disabled: true
        - name: btn-ghost
          label: Ghost / text
          desc: Ghost
        - name: btn-tag
          label: '# Tag example'
          desc: Tag
    combobox:
      label: Combobox
