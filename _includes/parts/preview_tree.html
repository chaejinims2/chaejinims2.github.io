<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG 미리보기 (appsettings 트리)</title>
    <link rel="stylesheet" href="preview.css">
</head>
<body>
    <!-- <p class="meta">appsettings.json 구조 기준 SVG 트리 · <code>/assets/svg/default/preview.html</code></p> -->
    <div id="root"></div>
    <script>
        var root = document.getElementById("root");
        var usingSet = new Set();

        function collectUsing(tree) {
            if (!tree) return;
            function add(list) {
                if (Array.isArray(list)) list.forEach(function (f) { if (f) usingSet.add(f); });
            }
            if (tree.App) {
                add(tree.App.Favicon);
                if (tree.App.Icons) add(tree.App.Icons.SidebarToggle);
            }
            if (tree.Nav && Array.isArray(tree.Nav.Sections)) {
                tree.Nav.Sections.forEach(function (s) {
                    add(s.Icon);
                    if (Array.isArray(s.Subsections)) s.Subsections.forEach(function (sub) { add(sub.Icon); });
                });
            }
        }

        function makeIconCell(fileName) {
            var isUsing = usingSet.has(fileName);
            var cell = document.createElement("div");
            cell.className = "cell" + (isUsing ? " cell-using" : "");
            cell.title = "클릭하면 파일명 복사: " + fileName;
            var img = document.createElement("img");
            img.src = fileName;
            img.alt = fileName.replace(/\.svg$/i, "");
            img.onerror = function () { this.style.background = "#4a2"; this.alt = "?"; };
            cell.appendChild(img);
            var feedback = document.createElement("span");
            feedback.className = "cell-feedback";
            cell.appendChild(feedback);
            cell.addEventListener("click", function (e) {
                e.stopPropagation();
                navigator.clipboard.writeText(fileName).then(function () {
                    cell.classList.add("copied");
                    feedback.textContent = "복사됨";
                    setTimeout(function () {
                        cell.classList.remove("copied");
                        feedback.textContent = "";
                    }, 800);
                }).catch(function () {
                    feedback.textContent = "복사 실패";
                    setTimeout(function () { feedback.textContent = ""; }, 800);
                });
            });
            return cell;
        }

        function renderTreeNode(parent, data, label, key, childrenFn, iconList) {
            var hasChildren = childrenFn ? childrenFn(data).length > 0 : false;
            var hasIcons = iconList && iconList.length > 0;
            var isLeaf = !hasChildren && !hasIcons;
            var firstIcon = hasIcons && iconList[0] && typeof iconList[0] === "string" ? iconList[0] : null;

            var li = document.createElement("li");
            li.className = "tree-node" + (isLeaf ? " leaf" : " open");

            var inner = document.createElement("div");
            inner.className = "tree-node-inner" + (isLeaf ? "" : " open");
            if (firstIcon) {
                inner.appendChild(makeIconCell(firstIcon));
            }
            if (key) {
                var keySpan = document.createElement("span");
                keySpan.className = "tree-key";
                keySpan.textContent = key + " ";
                inner.appendChild(keySpan);
            }
            var labelSpan = document.createElement("span");
            labelSpan.className = "tree-label";
            labelSpan.textContent = label;
            inner.appendChild(labelSpan);
            var toggle = document.createElement("span");
            toggle.className = "tree-toggle";
            toggle.textContent = isLeaf ? "" : "▶";
            inner.appendChild(toggle);
            li.appendChild(inner);

            inner.addEventListener("click", function (e) {
                if (isLeaf) return;
                li.classList.toggle("open");
                inner.classList.toggle("open");
            });

            if (hasChildren) {
                var childContainer = document.createElement("div");
                childContainer.className = "tree-children";
                childrenFn(data).forEach(function (ch) {
                    ch(childContainer);
                });
                li.appendChild(childContainer);
            }

            parent.appendChild(li);
        }

        function renderTree(tree) {
            collectUsing(tree);
            var ul = document.createElement("ul");
            ul.className = "tree";

            var appData = tree.App || {};
            var sections = (tree.Nav && Array.isArray(tree.Nav.Sections)) ? tree.Nav.Sections : [];
            renderTreeNode(ul, { App: appData, Sections: sections }, "App", null, function () {
                var out = [];
                if (appData.Favicon && appData.Favicon.length) {
                    out.push(function (cont) {
                        renderTreeNode(cont, null, "Favicon", "Favicon", null, appData.Favicon);
                    });
                }
                if (appData.Icons && appData.Icons.SidebarToggle && appData.Icons.SidebarToggle.length) {
                    out.push(function (cont) {
                        renderTreeNode(cont, null, "SidebarToggle", "Icons.SidebarToggle", null, appData.Icons.SidebarToggle);
                    });
                }
                sections.forEach(function (s) {
                    var subs = s.Subsections || [];
                    var subFns = subs.filter(function (sub) {
                        return (sub.Icon && sub.Icon.length) || sub.Key;
                    }).map(function (sub) {
                        return function (cont2) {
                            renderTreeNode(cont2, sub, (sub.Label || sub.Key || ""), sub.Key, null, sub.Icon);
                        };
                    });
                    out.push(function (cont) {
                        renderTreeNode(cont, s, (s.Label || s.SectionKey || ""), s.SectionKey, function () { return subFns; }, s.Icon);
                    });
                });
                return out;
            }, appData.Favicon);

            root.appendChild(ul);
        }

        fetch("/assets/svg_tree.json")
            .then(function (r) { return r.json(); })
            .then(function (tree) {
                renderTree(tree);
            })
            .catch(function (err) {
                root.innerHTML = "<p class=\"meta\" style=\"color:#c66;\">로드 실패 (서버 실행 필요): " + (err && err.message ? err.message : String(err)) + "</p>";
            });
    </script>
</body>
</html>
