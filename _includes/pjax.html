<script>
    (function () {
        var appRoot = document.querySelector('.app-root');
        var contentRoot = document.querySelector('.app-content');
        if (!appRoot || !contentRoot) return;

        var base = document.querySelector('base') && document.querySelector('base').href
            ? new URL(document.querySelector('base').href).pathname.replace(/\/$/, '') || ''
            : '';

        function getPath(url) {
            try {
                var a = document.createElement('a');
                a.href = url;
                return a.pathname.replace(/\/$/, '') || '/';
            } catch (e) { return url; }
        }

        function isSameOrigin(href) {
            if (!href || href === '#' || href.startsWith('javascript:')) return false;
            try {
                var loc = window.location;
                var a = document.createElement('a');
                a.href = href;
                return a.origin === loc.origin;
            } catch (e) { return false; }
        }

        function shouldSkip(el) {
            return el.target === '_blank' || el.hasAttribute('download') ||
                el.getAttribute('rel') === 'external' || (el.getAttribute('href') || '').indexOf('/admin') === 0;
        }

        function setActive(path) {
            path = path.replace(/\/$/, '') || '/';
            var pathSegs = path.split('/').filter(Boolean);
            var groupKey = pathSegs[0] || '';

            document.querySelectorAll('.app-nav-group').forEach(function (g) {
                var link = g.querySelector('.app-nav-item');
                var href = (link && link.getAttribute('href')) || '';
                var segs = href.split('/').filter(Boolean);
                var key = segs[0] || '';
                var active = key === groupKey || (groupKey === 'tests' && key === 'labs');
                g.classList.toggle('active', active);
            });
            document.querySelectorAll('.app-nav-item').forEach(function (a) {
                var href = (a.getAttribute('href') || '').replace(/\/$/, '') || '/';
                var hrefSegs = href.split('/').filter(Boolean);
                var hrefKey = hrefSegs[0] || '';
                var labsOnly = hrefKey === 'labs' && hrefSegs.length === 1;
                a.classList.toggle('active', href === path || (path.indexOf(href) === 0 && href !== '/') || (groupKey === 'tests' && labsOnly));
            });
            document.querySelectorAll('.app-nav-sub-item').forEach(function (a) {
                var href = (a.getAttribute('href') || '').replace(/\/$/, '') || '/';
                a.classList.toggle('active', href === path);
            });
            document.querySelectorAll('.app-topmenu-item').forEach(function (a) {
                var href = (a.getAttribute('href') || '').replace(/\/$/, '') || '/';
                var segs = href.split('/').filter(Boolean);
                var key = segs[0] || '';
                a.classList.toggle('active', key === groupKey);
            });
        }

        function loadPage(url, push) {
            var path = getPath(url);
            fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
                .then(function (r) { return r.text(); })
                .then(function (html) {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(html, 'text/html');
                    var newContent = doc.querySelector('.app-content');
                    if (!newContent) {
                        window.location.href = url;
                        return;
                    }
                    contentRoot.innerHTML = newContent.innerHTML;
                    var title = doc.querySelector('title');
                    if (title && title.textContent) document.title = title.textContent;
                    if (push !== false) history.pushState({ path: path }, '', url);
                    setActive(path);
                    if (window.initFooterSidebarPositionCheckbox) window.initFooterSidebarPositionCheckbox();
                    if (window.initSidebarCompactCheckbox) window.initSidebarCompactCheckbox();
                    if (window.initCodeCopyButtons) window.initCodeCopyButtons();
                    if (window.initLm11LogPage) window.initLm11LogPage();
                    if (window.initQuizAnswerToggles) window.initQuizAnswerToggles();
                    if (window.initLm11QuizPage) window.initLm11QuizPage();
                    if (window.initVocaPage) window.initVocaPage();
                    if (window.initVocaExamplesPage) window.initVocaExamplesPage();
                    if (window.highlightExampleWords) window.highlightExampleWords(document.getElementById("quiz-section"));
                    // voca editor page (PJAX에서는 page 내부 script가 실행되지 않으므로 여기서 로드/초기화)
                    if (document.querySelector('.voca-editor')) {
                        (function () {
                            function run() { if (window.initVocaEditorPage) window.initVocaEditorPage(); }
                            if (window.initVocaEditorPage) { run(); return; }
                            // PJAX로 삽입된 content 안의 <script> 태그는 실행되지 않으므로,
                            // 태그 존재 여부로 로드를 스킵하면 안 됨.
                            if (window.__veScriptLoading) { return; }
                            window.__veScriptLoading = true;
                            var s = document.createElement('script');
                            s.src = (base || '') + '/assets/js/pages/voca-editor.js';
                            s.onload = function () { window.__veScriptLoading = false; run(); };
                            s.onerror = function () { window.__veScriptLoading = false; };
                            document.body.appendChild(s);
                        })();
                    }

                    // initLm11QuizCardInteractions is called after Start button click
                })
                .catch(function () { window.location.href = url; });
        }

        document.addEventListener('click', function (e) {
            var a = e.target.closest('a');
            if (!a || !isSameOrigin(a.href) || shouldSkip(a)) return;
            var full = (a.getAttribute('href') || '').trim();
            if (!full || full === '#' || full.indexOf('#') === 0) return;
            var path = getPath(full);
            var currentPath = getPath(location.href);
            if (path === currentPath) return;
            if (path === '' || path === '/') return;
            e.preventDefault();
            loadPage(a.href, true);
        }, true);

        window.addEventListener('popstate', function (e) {
            loadPage(location.href, false);
        });

        history.replaceState({ path: getPath(location.href) }, '', location.href);
        setActive(getPath(location.href));
    })();
</script>
