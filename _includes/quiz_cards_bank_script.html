<script>
(function () {
  var STORAGE_KEY = 'lm11-answer-sheet';
  var cards = document.querySelectorAll('.quiz-card-block');
  function shuffleList(list) {
    var items = [].slice.call(list.children);
    for (var i = items.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = items[i];
      items[i] = items[j];
      items[j] = t;
    }
    items.forEach(function (el) {
      list.appendChild(el);
    });
  }

  function setChoiceNumbers(ol) {
    [].slice.call(ol.querySelectorAll('.quiz-card__option')).forEach(function (li, i) {
      li.setAttribute('data-choice', String(i + 1));
    });
  }

  function loadAnswers() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      return {};
    }
  }

  function saveAnswers(obj) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
    } catch (e) {}
  }

  function getQuestionKey(card) {
    var ek = card.getAttribute('data-exam-key');
    var lid = card.getAttribute('data-local-id');
    return ek && lid ? ek + '-' + lid : null;
  }

  function applySelectionToCard(card, answers) {
    var key = getQuestionKey(card);
    if (!key) return;

    var choice = answers[key];
    card.querySelectorAll('.quiz-card__option').forEach(function (li) {
      var c = li.getAttribute('data-choice');
      var selected = c && String(choice) === c;
      li.classList.toggle('is-selected', selected);
      li.setAttribute('aria-pressed', selected ? 'true' : 'false');
    });
  }

  function handleOptionToggle(card, li, answers) {
    var key = getQuestionKey(card);
    if (!key) return;

    var choice = li.getAttribute('data-choice');
    if (!choice) return;

    var num = parseInt(choice, 10);
    if (num < 1 || num > 4) return;

    if (answers[key] === num) {
      delete answers[key];
    } else {
      answers[key] = num;
    }

    saveAnswers(answers);
    applySelectionToCard(card, answers);
    notifyAnswerSheet();
  }

  function notifyAnswerSheet() {
    // answer sheet feature removed
  }

  function syncAnswerToggleState(panel) {
    if (!panel) return;
    var content = panel.querySelector('.quiz-answer-content');
    var toggle = panel.querySelector('.quiz-answer-toggle');
    if (!content || !toggle) return;

    var expanded = !content.classList.contains('is-hidden');
    toggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
    toggle.setAttribute('aria-label', expanded ? '해설 숨기기' : '해설 보기');
  }

  function toggleAnswerPanel(panel) {
    if (!panel) return;
    var content = panel.querySelector('.quiz-answer-content');
    if (!content) return;

    content.classList.toggle('is-hidden');
    syncAnswerToggleState(panel);
  }

  // Shuffle options if needed
  document.querySelectorAll('.quiz-cards-set .quiz-card__options[data-shuffle]').forEach(function (ol) {
    shuffleList(ol);
    setChoiceNumbers(ol);
  });

  var answers = loadAnswers();
  cards.forEach(function (card) {
    applySelectionToCard(card, answers);
  });

  // 초기 해설 버튼 상태 동기화
  document.querySelectorAll('.quiz-answer-panel').forEach(function (panel) {
    syncAnswerToggleState(panel);
  });

  var quizRoot = document.querySelector('.quiz-cards-set');
  if (quizRoot) {
    quizRoot.addEventListener('click', function (e) {
      // 보기 선택
      var li = e.target.closest('.quiz-card__option');
      if (li && quizRoot.contains(li)) {
        var card = li.closest('.quiz-card-block');
        if (!card) return;
        handleOptionToggle(card, li, answers);
        return;
      }

      // 해설 토글
      var toggle = e.target.closest('.quiz-answer-toggle');
      if (toggle && quizRoot.contains(toggle)) {
        var panel = toggle.closest('.quiz-answer-panel');
        toggleAnswerPanel(panel);
      }
    });

    quizRoot.addEventListener('keydown', function (e) {
      // 보기 선택 키보드 처리
      var li = e.target.closest('.quiz-card__option');
      if (li && quizRoot.contains(li) && (e.key === 'Enter' || e.key === ' ')) {
        var card = li.closest('.quiz-card-block');
        if (!card) return;
        e.preventDefault();
        handleOptionToggle(card, li, answers);
        return;
      }

      // 해설 토글 키보드 처리
      var toggle = e.target.closest('.quiz-answer-toggle');
      if (toggle && quizRoot.contains(toggle) && (e.key === 'Enter' || e.key === ' ')) {
        var panel = toggle.closest('.quiz-answer-panel');
        e.preventDefault();
        toggleAnswerPanel(panel);
      }
    });
  }

  // 문제 본문 강조
  document.querySelectorAll('.quiz-card .quiz-card__body').forEach(function (el) {
    var text = el.textContent;
    if (!text) return;

    var re = /(틀린 것|알맞은 것|올바른 것)/g;
    if (re.test(text)) {
      el.innerHTML = el.innerHTML.replace(re, '<span class="quiz-body-wrong">$1</span>');
    }
  });

  // Pagination / single-card view
  var allCards = [].slice.call(cards);
  var prevBtn = document.getElementById('quiz-prev');
  var nextBtn = document.getElementById('quiz-next');
  var statusEl = document.getElementById('quiz-status');
  var examSelect = document.getElementById('quiz-exam-select');
  var subjectSelect = document.getElementById('quiz-subject-select');

  var visibleList = [];
  var currentIndex = 0;

  function updateFilteredList() {
    var examVal = examSelect ? examSelect.value : '';
    var subjVal = subjectSelect ? subjectSelect.value : '';

    visibleList = allCards.filter(function (c) {
      if (examVal && c.getAttribute('data-exam-key') !== examVal) return false;
      if (subjVal && c.getAttribute('data-subject-key') !== subjVal) return false;
      return true;
    });
  }

  function renderCard() {
    // hide all cards first
    allCards.forEach(function (c) { c.hidden = true; });

    var total = visibleList.length;
    if (total === 0) {
      if (statusEl) statusEl.textContent = '0 / 0';
      if (prevBtn) prevBtn.disabled = true;
      if (nextBtn) nextBtn.disabled = true;
      return;
    }

    if (currentIndex < 0) currentIndex = 0;
    if (currentIndex > total - 1) currentIndex = total - 1;

    // show only the current card
    var cardToShow = visibleList[currentIndex];
    if (cardToShow) cardToShow.hidden = false;

    if (statusEl) statusEl.textContent = (currentIndex + 1) + ' / ' + total;
    if (prevBtn) prevBtn.disabled = currentIndex === 0;
    if (nextBtn) nextBtn.disabled = currentIndex === total - 1;

    // ensure visible card is scrolled into view (smooth animation)
    try {
      cardToShow && cardToShow.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } catch (e) {}
  }

  function goNext() {
    if (currentIndex < visibleList.length - 1) {
      currentIndex += 1;
      renderCard();
    }
  }

  function goPrev() {
    if (currentIndex > 0) {
      currentIndex -= 1;
      renderCard();
    }
  }

  if (prevBtn) prevBtn.addEventListener('click', function () { goPrev(); });
  if (nextBtn) nextBtn.addEventListener('click', function () { goNext(); });

  // Keyboard navigation: 좌/우 화살표로 카드 이동
  document.addEventListener('keydown', function (e) {
    // 무분별한 트리거 방지: 입력상자, 텍스트영역, 셀렉트, contenteditable 등에서는 동작 안함
    var active = document.activeElement;
    if (active) {
      var tag = (active.tagName || '').toUpperCase();
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || active.isContentEditable) return;
    }

    // 모디파이어 키가 눌려 있으면 무시
    if (e.altKey || e.ctrlKey || e.metaKey) return;

    if (e.key === 'ArrowRight') {
      e.preventDefault();
      goNext();
      return;
    }

    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      goPrev();
      return;
    }
  });

  // Expose initializer so page-level filters can call it
  window.initLm11QuizPage = function () {
    updateFilteredList();
    currentIndex = 0;
    renderCard();
  };

  // initialize single-card view on load
  try {
    window.initLm11QuizPage();
  } catch (e) {}
})();
</script>
