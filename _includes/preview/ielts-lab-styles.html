<style>
  /* IELTS lab — preview 토큰/컴포넌트와 동일한 변수 사용 */
  /* 탑바 아래 .main 안에서 세로로 꽉 채우고, 스크롤은 패널 내부(.ielts-pane-body)에만 */
  .main-inner--ielts {
    max-width: none;
    padding: var(--space-6);
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-inner--ielts > #ielts-workspace {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding-bottom: 0;
  }

  #ielts-workspace .ielts-workspace-head {
    flex-shrink: 0;
  }

  .ielts-section {
    /* scroll-margin-top: var(--space-8); */
    padding-bottom: var(--space-8);
  }

  .ielts-section > .section-title {
    margin-bottom: var(--space-4);
  }

  .ielts-toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    gap: var(--space-6);
    padding: var(--space-6);
    margin-bottom: var(--space-5);
  }

  .ielts-toolbar .control-demo {
    min-width: min(100%, 200px);
    flex: 1 1 180px;
    max-width: 280px;
  }

  .ielts-toolbar-wrap {
    min-width: 0;
  }

  .ielts-toolbar--bar {
    margin-bottom: 0;
  }

  /* Breadcrumb (topbar only for IELTS) */
  .ielts-breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 0;
    margin-right: var(--space-2);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    flex: 0 0 auto;
    min-width: 0;
  }

  .ielts-breadcrumb__home {
    color: var(--text-muted);
    text-decoration: none;
  }

  .ielts-breadcrumb__home:hover {
    color: var(--text-primary);
  }

  .ielts-breadcrumb__sep {
    opacity: 0.7;
  }

  .ielts-view-toggle {
    padding: 2px 8px;
    min-height: 28px;
    align-self: center;
    text-transform: uppercase;
    text-decoration: none;
  }

  /* Reader popover */
  .ielts-reader-menu {
    position: relative;
    display: inline-flex;
    align-items: center;
  }

  .ielts-reader-panel {
    position: fixed; /* anchored via JS to avoid topbar scroll container */
    left: 0;
    top: 0;
    width: min(320px, calc(100vw - 24px));
    padding: var(--space-4);
    z-index: 60;
    max-height: min(70vh, 520px);
    overflow: auto;
  }

  .ielts-reader-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    margin-bottom: var(--space-3);
  }

  .ielts-reader-row .field-label {
    margin: 0;
    flex: 0 0 auto;
  }

  .ielts-reader-row .combo-wrap {
    width: 9.5rem;
    min-width: 8.5rem;
  }

  .ielts-range {
    flex: 1 1 auto;
    min-width: 0;
    accent-color: var(--accent);
  }

  .ielts-seg {
    display: inline-flex;
    gap: 2px;
    padding: 2px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface-muted);
  }

  .ielts-seg__btn {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 999px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    text-transform: uppercase;
  }

  .ielts-seg__btn[aria-pressed="true"] {
    background: var(--accent);
    color: var(--bg-base);
  }

  .ielts-reader-actions {
    display: flex;
    justify-content: flex-end;
    gap: var(--space-3);
    margin-top: var(--space-4);
  }

  /* Reader typography variables apply to passage body only */
  .ielts-lab-page #ielts-passage-body {
    --ielts-reader-font-size: 16px;
    --ielts-reader-line-height: 1.65;
    --ielts-reader-measure: 760px;
    --ielts-reader-font: var(--font-sans);
    font-size: var(--ielts-reader-font-size);
    line-height: var(--ielts-reader-line-height);
    font-family: var(--ielts-reader-font);
    max-width: var(--ielts-reader-measure);
    margin-left: auto;
    margin-right: auto;
  }

  /* Reader typography (passage); questions pane shares list/pre spacing */
  .ielts-lab-page #ielts-passage-body > :first-child,
  .ielts-lab-page #ielts-questions-body > :first-child {
    margin-top: 0;
  }

  .ielts-lab-page #ielts-passage-body > :last-child,
  .ielts-lab-page #ielts-questions-body > :last-child {
    margin-bottom: 0;
  }

  .ielts-lab-page #ielts-passage-body p,
  .ielts-lab-page #ielts-questions-body p {
    margin: 0 0 0.9em;
  }

  .ielts-lab-page #ielts-passage-body h1,
  .ielts-lab-page #ielts-passage-body h2,
  .ielts-lab-page #ielts-passage-body h3,
  .ielts-lab-page #ielts-passage-body h4,
  .ielts-lab-page #ielts-questions-body h1,
  .ielts-lab-page #ielts-questions-body h2,
  .ielts-lab-page #ielts-questions-body h3,
  .ielts-lab-page #ielts-questions-body h4 {
    margin: 1.2em 0 0.55em;
    color: var(--text-primary);
    font-weight: 600;
    letter-spacing: -0.01em;
    text-transform: none;
  }

  .ielts-lab-page #ielts-passage-body h1,
  .ielts-lab-page #ielts-questions-body h1 { font-size: 1.35em; }
  .ielts-lab-page #ielts-passage-body h2,
  .ielts-lab-page #ielts-questions-body h2 { font-size: 1.2em; }
  .ielts-lab-page #ielts-passage-body h3,
  .ielts-lab-page #ielts-questions-body h3 { font-size: 1.1em; }
  .ielts-lab-page #ielts-passage-body h4,
  .ielts-lab-page #ielts-questions-body h4 { font-size: 1.02em; }

  .ielts-lab-page #ielts-passage-body ul,
  .ielts-lab-page #ielts-passage-body ol,
  .ielts-lab-page #ielts-questions-body ul,
  .ielts-lab-page #ielts-questions-body ol {
    margin: 0.2em 0 1em 1.25em;
    padding: 0;
  }

  .ielts-lab-page #ielts-passage-body li,
  .ielts-lab-page #ielts-questions-body li {
    margin: 0.25em 0;
  }

  .ielts-lab-page #ielts-passage-body blockquote,
  .ielts-lab-page #ielts-questions-body blockquote {
    margin: 1em 0;
    padding: 0.75em 1em;
    border-left: 3px solid var(--border);
    background: var(--surface-muted);
    color: var(--text-muted);
    border-radius: 8px;
  }

  .ielts-lab-page #ielts-passage-body pre,
  .ielts-lab-page #ielts-questions-body pre {
    margin: 1em 0;
    padding: 0.9em 1em;
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: auto;
  }

  .ielts-lab-page #ielts-passage-body code,
  .ielts-lab-page #ielts-questions-body code {
    font-family: var(--font-mono);
  }

  /* Drag-to-highlight (session-only; cleared when passage HTML is replaced) */
  .ielts-lab-page #ielts-passage-body mark.ielts-highlight {
    background: rgba(245, 158, 11, 0.35);
    background: color-mix(in srgb, var(--accent, #f59e0b) 38%, transparent);
    color: inherit;
    border-radius: 2px;
    padding: 0.06em 0;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }

  .ielts-lab-page #ielts-passage-body::selection,
  .ielts-lab-page #ielts-passage-body *::selection {
    background: rgba(245, 158, 11, 0.4);
    background: color-mix(in srgb, var(--accent, #f59e0b) 45%, transparent);
  }

  .ielts-breadcrumb__home,
  .ielts-breadcrumb__item {
    color: var(--text-muted);
    text-decoration: none;
    max-width: 22ch;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ielts-breadcrumb__combo {
    flex: 0 0 auto;
  }
  .ielts-workspace-head {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    justify-content: space-between;
    gap: var(--space-4);
    margin-bottom: var(--space-4);
  }

  .ielts-workspace-head .section-heading {
    margin-bottom: 0;
  }

  .ielts-active-skill {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
  }

  .ielts-split {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
    flex: 1;
    min-height: 0;
  }

  /* View mode overrides (auto / single / split) */
  .ielts-lab-page[data-view="single"] .ielts-split {
    display: flex !important;
    flex-direction: column !important;
  }

  /* Single(1PAGE): passage pane taller than answer pane */
  .ielts-lab-page[data-view="single"] .ielts-split > .ielts-pane:first-child {
    flex: 2 1 0;
  }

  .ielts-lab-page[data-view="single"] .ielts-split > .ielts-pane:last-child {
    flex: 1 1 0;
  }

  .ielts-lab-page[data-view="split"] .ielts-split {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    grid-template-rows: 1fr !important;
    align-items: stretch !important;
  }

  @media (max-width: 959px) {
    .ielts-lab-page[data-view="split"] .ielts-split {
      overflow-x: auto;
    }
    .ielts-lab-page[data-view="split"] .ielts-pane {
      min-width: 28rem;
    }
  }

  @media (min-width: 960px) {
    .ielts-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
      gap: var(--space-4);
      align-items: stretch;
    }

    .ielts-split .ielts-pane {
      min-height: 0;
    }
  }

  .ielts-pane {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  .ielts-pane-head {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    width: 100%;
    align-self: stretch;
    box-sizing: border-box;
    flex-shrink: 0;
    padding-bottom: var(--space-3);
    margin-bottom: var(--space-3);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: none;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  .ielts-pane-head > * {
    margin: 0;
    min-width: 0;
  }

  .ielts-pane-head > *:only-child {
    width: 100%;
  }

  .ielts-pane-head .section-title {
    flex: 1 1 auto;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: none;
    color: var(--text-primary);
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
    background: var(--overlay-w-0a);
    width: fit-content;
  }

  .ielts-pane-head .ielts-active-skill {
    flex: 0 0 auto;
    text-align: right;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: none;
    color: var(--text-muted);
    padding: 0;
    border-radius: 0;
    border: none;
    background: transparent;
  }

  .ielts-pane-body {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding-right: var(--space-2);
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-primary);
  }

  .ielts-pane-body--muted {
    color: var(--text-muted);
  }

  /* 패널 스크롤은 유지하고 스크롤바만 숨김 (READER → Bars OFF) */
  .ielts-lab-page.ielts-hide-pane-scrollbars .ielts-pane-body {
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .ielts-lab-page.ielts-hide-pane-scrollbars .ielts-pane-body::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
  }

  .ielts-prose-sample h3 {
    font-size: 1.05rem;
    font-weight: 600;
    margin: var(--space-5) 0 var(--space-3);
    color: var(--text-primary);
  }

  .ielts-prose-sample h3:first-child {
    margin-top: 0;
  }

  .ielts-prose-sample p {
    margin-bottom: var(--space-3);
  }

  .ielts-answer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(7.5rem, 1fr));
    gap: var(--space-3);
  }

  .ielts-ans-cell {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .ielts-ans-cell label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .ielts-ans-input {
    width: 100%;
    min-height: 40px;
    padding: 8px 10px;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 500;
    color: var(--app-text);
    background-color: var(--surface-muted);
    border: 0.5px solid var(--app-border);
    border-radius: 6px;
    caret-color: var(--app-text);
    transition: border-color 0.15s;
  }

  .ielts-ans-input:hover {
    border-color: var(--accent);
  }

  .ielts-ans-input:focus-visible {
    outline: 1px solid var(--focus-ring);
    outline-offset: 1px;
  }

  .ielts-ref-card {
    margin-top: var(--space-6);
  }

  .ielts-ref-card figcaption {
    margin-top: var(--space-3);
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .ielts-ref-img {
    display: block;
    width: 100%;
    max-width: 720px;
    height: auto;
    border-radius: 8px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-2);
  }

  .ielts-actions {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-3);
    margin-top: var(--space-5);
  }

  /* 이 페이지만: 사이드바를 항상 상단 탑바 레이아웃으로 (preview @media max-width 900px 와 동일) */
  .ielts-lab-page .app {
    flex-direction: column;
  }

  .ielts-lab-page .sidebar {
    width: 100%;
    max-height: none;
    flex-direction: row;
    flex-wrap: nowrap;
    align-items: center;
    justify-content: flex-start;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    border-right: none;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    overflow-y: visible; /* allow reader popover */
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    position: sticky;
    top: 0;
    z-index: 40;
    background: var(--surface);
  }

  .ielts-lab-page .sidebar .brand {
    flex-shrink: 0;
    min-width: 0;
    gap: 0;
    font-size: 0;
    line-height: 0;
    color: transparent;
  }

  .ielts-lab-page .sidebar .brand-logo {
    width: 32px;
    height: 32px;
  }

  .ielts-lab-page .ielts-toolbar-wrap {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    align-items: center;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }

  /* 테마 콤보(.theme-switcher .combo-wrap)와 동일한 셀렉트 폭·간격 */
  .ielts-lab-page .ielts-combo-stack {
    position: relative;
    display: flex;
    flex-direction: column;
    flex-wrap: nowrap;
    align-items: stretch;
    gap: var(--space-2);
    flex-shrink: 0;
  }

  .ielts-lab-page .ielts-combo-stack .field-label {
    margin-bottom: 0;
  }

  .ielts-lab-page .ielts-combo-stack .combo-wrap {
    font-family: var(--font-mono);
    flex: 0 0 auto;
    width: 7.25rem;
    min-width: 6.75rem;
  }

  .ielts-lab-page .ielts-combo-stack--book .combo-wrap {
    width: min(12.5rem, 42vw);
    min-width: 7.25rem;
    max-width: 14rem;
  }

  .ielts-lab-page .ielts-toolbar--bar {
    display: flex;
    flex-wrap: nowrap;
    align-items: flex-end;
    gap: var(--space-2);
    padding: 0;
    margin: 0;
    width: max-content;
    max-width: 100%;
    border: none;
    box-shadow: none;
    background: transparent;
  }

  .ielts-lab-page .sidebar-stack {
    flex-direction: row;
    align-items: center;
    justify-content: flex-end;
    margin-left: auto;
    flex: 0 1 auto;
    min-width: 0;
    max-width: 100%;
    gap: var(--space-2);
  }

  .ielts-lab-page .sidebar-body {
    flex: 0 1 auto;
    min-width: 0;
    min-height: 0;
    overflow-x: auto;
    overflow-y: visible; /* allow reader popover */
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }

  .ielts-lab-page .sidebar-body > div {
    position: relative;
    min-width: min-content;
  }

  /* Sidebar body contains breadcrumb + toolbar: keep them in one row */
  .ielts-lab-page .sidebar-body {
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }

  .ielts-lab-page .ielts-breadcrumb {
    flex: 0 1 auto;
    min-width: 0;
    overflow: hidden;
  }

  .ielts-lab-page .sidebar-footer {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
    flex-shrink: 0;
  }

  .ielts-lab-page .theme-switcher {
    position: relative;
    flex-direction: row;
    flex-wrap: nowrap;
    align-items: center;
    gap: var(--space-2);
    flex-shrink: 0;
  }

  .ielts-lab-page .theme-switcher .field-label {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .ielts-lab-page .theme-switcher .combo-wrap {
    flex: 0 0 auto;
    width: 7.25rem;
    min-width: 6.75rem;
  }

  /* Breadcrumb-like combobox styling (IELTS topbar only)
     요구사항: 화살표 숨김, border 0, mono, 슬래시와 같은 색상(text-muted),
     그리고 텍스트처럼 보이도록 배경/호버 강조 최소화 */
  .ielts-lab-page .sidebar .combo-wrap::after {
    display: none;
  }

  .ielts-lab-page .sidebar select.combo {
    min-height: 36px;
    padding: 6px 10px;
    font-size: 13px;
    border: 0;
    background: transparent;
    background-image: none;
    color: var(--text-muted);
    font-family: var(--font-mono);
    text-transform: uppercase;
    width: auto; /* JS가 내용에 맞게 px로 설정 */
  }

  .ielts-lab-page .sidebar .combo-wrap {
    width: auto;
  }

  .ielts-lab-page .sidebar select.combo:hover {
    background-image: none;
    background-color: transparent;
    border-color: transparent;
    filter: none;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-thickness: 1px;
  }

  .ielts-lab-page .sidebar .nav-group-label {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .ielts-lab-page .sidebar .nav-list {
    flex-direction: row;
    flex-wrap: nowrap;
    gap: 2px;
    padding-bottom: 2px;
  }

  .ielts-lab-page .sidebar .nav-list li {
    flex-shrink: 0;
  }

  .ielts-lab-page .sidebar .nav-list a {
    font-size: 0;
    line-height: 0;
    gap: 0;
    padding: 8px;
    justify-content: center;
    align-items: center;
    min-width: 40px;
    min-height: 40px;
  }

  .ielts-lab-page .sidebar .nav-list a .nav-icon {
    width: 22px;
    height: 22px;
    opacity: 0.9;
  }

  .ielts-lab-page .nav-nested {
    display: none;
  }

  .ielts-lab-page .main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
</style>
