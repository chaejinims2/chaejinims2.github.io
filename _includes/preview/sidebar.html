  <aside class="sidebar" aria-label="Preview navigation">
    <a class="brand" href="#intro">
      <img class="brand-logo" src="{{ 'assets/logos/cherry-logo-red-light.png' | relative_url }}" width="28" height="28" alt="" decoding="async" />
      Chaejin Im
    </a>
    <div class="sidebar-stack">
      <div class="sidebar-body">
        <div>
          <div class="nav-group-label">Preview</div>
          <ul class="nav-list">
            <li><a href="#intro"><svg class="nav-icon" aria-hidden="true"><use href="#i-home"/></svg>Home</a></li>
            {% for sec in page.preview_sections %}
            <li><a href="#{{ sec.id }}"><svg class="nav-icon" aria-hidden="true"><use href="#i-{{ sec.nav_icon }}"/></svg>{{ sec.nav_label }}</a></li>
            {% endfor %}
          </ul>
        </div>
      </div>
      <div class="sidebar-footer">
        <div class="theme-switcher">
          <label class="field-label" id="theme-label" for="theme-select">Theme</label>
          <div class="combo-wrap">
            <select id="theme-select" class="combo">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="modern">Modern</option>
              <option value="connect" selected>Connect</option>
              <option value="claude">Claude</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </aside>
