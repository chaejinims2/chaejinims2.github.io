        {% assign g = dp.surfaces.elevation %}
        <div class="elevation-grid">
          {% for item in g.items %}
          <div class="elevation-card {{ item.name }}">
            <div>
              <div class="elevation-name">{{ item.label }}</div>
              <div class="elevation-desc">{% if item.desc_html %}{{ item.desc_html }}{% else %}{{ item.desc }}{% endif %}</div>
            </div>
            <div class="elevation-level">{{ item.level }}</div>
          </div>
          {% endfor %}
        </div>
