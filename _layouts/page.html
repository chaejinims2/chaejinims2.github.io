---
layout: default
---
<main class="app-main">
  <div class="app-content">
    {% if page.title %}<h1 class="page-title">{{ page.title }}</h1>{% endif %}
    {% if page.intro %}<div class="page-intro">{{ page.intro }}</div>{% endif %}
    {% if page.tags and page.tags.size > 0 %}
    <div class="page-tags" aria-label="Tech tags">
      {% for t in page.tags %}
      <span class="page-tag"># {{ t }}</span>
      {% endfor %}
    </div>
    {% endif %}
    {{ content }}
  </div>
</main>
